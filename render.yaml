services:
  # The unified Backend Service (Main + ML)
  - type: web
    name: dekho-api
    env: python
    plan: free
    buildCommand: pip install --no-cache-dir -r backend/requirements.txt && pip install --no-cache-dir -r Dekho_Chatbot_2.0/chatbot-backend/requirements.txt
    startCommand: bash start-render.sh
    envVars:
      - key: DATABASE_URL
        sync: false # You will paste your Neon DB URL in the Render dashboard
      - key: GEMINI_API_KEY
        sync: false # Paste your Gemini Key in the dashboard
      - key: JWT_SECRET_KEY
        generateValue: true # Render will auto-generate a secure random key
      - key: ML_SERVICE_URL
        value: http://127.0.0.1:8001 # Points to the background ML service
      - key: PYTHON_VERSION
        value: 3.11.0

